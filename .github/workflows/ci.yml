name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDKs
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Restore
        run: dotnet restore Parol.Runtime.slnx

      - name: Verify public API documentation
        run: dotnet build src/Parol.Runtime/Parol.Runtime.csproj -c Release --no-restore -warnaserror:CS1591

      - name: Build runtime (netstandard2.0)
        run: dotnet build src/Parol.Runtime/Parol.Runtime.csproj -c Release --no-restore -f netstandard2.0

      - name: Build runtime (net8.0)
        run: dotnet build src/Parol.Runtime/Parol.Runtime.csproj -c Release --no-restore -f net8.0

      - name: Build runtime (net9.0)
        run: dotnet build src/Parol.Runtime/Parol.Runtime.csproj -c Release --no-restore -f net9.0

      - name: Build runtime (net10.0)
        run: dotnet build src/Parol.Runtime/Parol.Runtime.csproj -c Release --no-restore -f net10.0

      - name: Build (Release)
        run: dotnet build Parol.Runtime.slnx -c Release --no-restore

      - name: Test (Release, net8.0)
        run: dotnet test tests/Parol.Runtime.Tests/Parol.Runtime.Tests.csproj -c Release --no-build -f net8.0

      - name: Test (Release, net9.0)
        run: dotnet test tests/Parol.Runtime.Tests/Parol.Runtime.Tests.csproj -c Release --no-build -f net9.0

      - name: Test (Release, net10.0)
        run: dotnet test tests/Parol.Runtime.Tests/Parol.Runtime.Tests.csproj -c Release --no-build -f net10.0
